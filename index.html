<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generic Airline — Seat Selection</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f4f6fa;
    color: #1a2332;
    padding: 12px;
    font-size: 13px;
  }

  /* ── Header ─────────────────────────────────────────── */
  .header {
    background: linear-gradient(135deg, #003087 0%, #0050C8 100%);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 12px;
    color: #fff;
  }
  .header h1 { font-size: 16px; font-weight: 700; }
  .header .meta {
    font-size: 11px;
    color: #A0C4FF;
    margin-top: 3px;
    letter-spacing: 0.04em;
  }

  /* ── Confirmation banner (the part the customer reads off) ── */
  .confirm-banner {
    background: #FFF3CD;
    border: 2px solid #FFC107;
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 12px;
    text-align: center;
    transition: all 0.25s ease;
  }
  .confirm-banner.empty {
    background: #EEF4FF;
    border-color: #003087;
  }
  .confirm-banner.selected {
    background: #D4EDDA;
    border-color: #28A745;
  }
  .confirm-banner .label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #555;
    margin-bottom: 4px;
  }
  .confirm-banner .value {
    font-size: 22px;
    font-weight: 700;
    color: #003087;
    font-family: 'SF Mono', 'Courier New', monospace;
    letter-spacing: 0.05em;
  }
  .confirm-banner.selected .value { color: #1B5E20; }
  .confirm-banner .sub {
    font-size: 11px;
    color: #555;
    margin-top: 4px;
  }
  .confirm-banner .copy-hint {
    font-size: 10px;
    color: #003087;
    font-weight: 700;
    margin-top: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* ── Legend ──────────────────────────────────────────── */
  .legend {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 10px;
    padding: 8px 10px;
    background: #fff;
    border-radius: 6px;
    border: 1px solid #e0e6ed;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 600;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid;
  }

  /* ── Seat map ────────────────────────────────────────── */
  .cabin {
    background: #fff;
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 8px;
    border: 1px solid #e0e6ed;
  }
  .cabin-header {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 1px dashed #ccd4e0;
  }
  .col-headers {
    display: flex;
    gap: 3px;
    justify-content: center;
    margin-bottom: 4px;
    padding-left: 22px;
  }
  .col-headers span {
    width: 28px;
    font-size: 9px;
    font-weight: 700;
    color: #888;
    text-align: center;
  }
  .col-headers .gap-spacer { width: 12px; }

  .row {
    display: flex;
    gap: 3px;
    justify-content: center;
    align-items: center;
    margin-bottom: 3px;
  }
  .row-num {
    width: 22px;
    font-size: 9px;
    font-weight: 700;
    color: #666;
    text-align: right;
    padding-right: 4px;
  }
  .row .gap-spacer { width: 12px; }

  .seat {
    width: 28px;
    height: 28px;
    border-radius: 4px;
    border: 1px solid;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.12s ease;
    flex-shrink: 0;
    user-select: none;
  }
  .seat:hover:not(.taken):not(.selected) {
    transform: scale(1.15);
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    z-index: 10;
  }

  /* Cabin colors */
  .seat.fc { background: #F3E5F5; border-color: #9C27B0; color: #4A148C; }
  .seat.xl { background: #E3F2FD; border-color: #2196F3; color: #0D47A1; }
  .seat.ex { background: #FFF3CD; border-color: #FFC107; color: #795548; }
  .seat.av { background: #E8F5E9; border-color: #4CAF50; color: #2E7D32; }

  .seat.taken {
    background: #ddd !important;
    border-color: #bbb !important;
    color: #999 !important;
    cursor: not-allowed;
  }
  .seat.taken::after { content: "✕"; }

  .seat.selected {
    background: #003087 !important;
    border-color: #003087 !important;
    color: #fff !important;
    transform: scale(1.2);
    box-shadow: 0 3px 10px rgba(0,48,135,0.5);
  }

  /* ── Front of plane ─────────────────────────────────── */
  .nose {
    text-align: center;
    font-size: 9px;
    font-weight: 700;
    color: #888;
    padding: 6px 0;
    background: #fff;
    border-radius: 8px 8px 0 0;
    border: 1px solid #e0e6ed;
    border-bottom: none;
    margin-bottom: 0;
    letter-spacing: 0.2em;
  }
  .nose::after { content: " ▲ FRONT"; color: #003087; }

  .footer-note {
    font-size: 10px;
    color: #888;
    text-align: center;
    margin-top: 10px;
    font-style: italic;
  }
</style>
</head>
<body>

<div class="header">
  <h1>✈ Select Your Seat</h1>
  <div class="meta">Flight [FLIGHT #] · [ORIGIN] → [DESTINATION] · [DATE]</div>
</div>

<div class="confirm-banner empty" id="confirmBanner">
  <div class="label">Your Selection</div>
  <div class="value" id="seatValue">— Tap a seat below —</div>
  <div class="sub" id="seatDetail">First Class · Extra Legroom · Exit Row · Economy</div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:#F3E5F5;border-color:#9C27B0"></div>First Class</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#E3F2FD;border-color:#2196F3"></div>Extra Legroom</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#FFF3CD;border-color:#FFC107"></div>Exit Row</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#E8F5E9;border-color:#4CAF50"></div>Economy</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#ddd;border-color:#bbb"></div>Taken</div>
</div>

<div class="nose">CABIN</div>
<div id="seatMap"></div>

<div class="footer-note">After selecting, type your seat code into the chat input field.</div>

<script>
  // Seat map config
  const COLS = ['A', 'B', 'C', 'D', 'E', 'F'];
  const TAKEN = {
    1: ['B','E'], 2: ['A','F'], 3: ['C'], 4: ['D','E'],
    5: ['A','B'], 6: ['F'], 7: ['C','D'], 8: ['A'],
    9: ['B','E','F'], 10: ['D'], 11: ['A','C'], 12: ['B','F'],
    13: ['E'], 14: ['A'], 15: ['C','D'], 16: ['B'],
    17: ['A','F'], 18: ['C','E'], 19: ['D'], 20: ['B','C','F']
  };
  const CABINS = [
    { type: 'fc', label: 'First Class · Included',          rows: [1,2,3,4],         price: 0  },
    { type: 'xl', label: 'Extra Legroom · +$45',            rows: [5,6],             price: 45 },
    { type: 'av', label: 'Economy · +$15',                  rows: [7,8,9,10,11,12,13], price: 15 },
    { type: 'ex', label: 'Exit Row · +$40',                 rows: [14,15],           price: 40 },
    { type: 'av', label: 'Economy · +$15',                  rows: [16,17,18,19,20],  price: 15 },
  ];
  const CABIN_NAMES = { fc: 'First Class', xl: 'Extra Legroom', ex: 'Exit Row', av: 'Economy' };

  function buildMap() {
    const map = document.getElementById('seatMap');
    let html = '';

    CABINS.forEach((cabin, idx) => {
      html += `<div class="cabin">`;
      html += `<div class="cabin-header" style="color:${getCabinColor(cabin.type)}">${cabin.label}</div>`;

      // Column headers (only on first cabin)
      if (idx === 0) {
        html += `<div class="col-headers">`;
        html += `<span>A</span><span>B</span><span>C</span>`;
        html += `<span class="gap-spacer"></span>`;
        html += `<span>D</span><span>E</span><span>F</span>`;
        html += `</div>`;
      }

      cabin.rows.forEach(rowNum => {
        html += `<div class="row">`;
        html += `<span class="row-num">${rowNum}</span>`;
        COLS.forEach((col, colIdx) => {
          const isTaken = (TAKEN[rowNum] || []).includes(col);
          const cls = isTaken ? `${cabin.type} taken` : cabin.type;
          const data = `data-row="${rowNum}" data-col="${col}" data-cabin="${cabin.type}" data-price="${cabin.price}"`;
          html += `<div class="seat ${cls}" ${data}>${isTaken ? '' : col}</div>`;
          if (colIdx === 2) html += `<span class="gap-spacer"></span>`;
        });
        html += `</div>`;
      });
      html += `</div>`;
    });

    map.innerHTML = html;
    attachClicks();
  }

  function getCabinColor(type) {
    return { fc: '#9C27B0', xl: '#2196F3', ex: '#795548', av: '#2E7D32' }[type];
  }

  function attachClicks() {
    document.querySelectorAll('.seat:not(.taken)').forEach(seat => {
      seat.addEventListener('click', () => selectSeat(seat));
    });
  }

  function selectSeat(seat) {
    document.querySelectorAll('.seat.selected').forEach(s => s.classList.remove('selected'));
    seat.classList.add('selected');

    const row = seat.dataset.row;
    const col = seat.dataset.col;
    const cabin = seat.dataset.cabin;
    const price = parseInt(seat.dataset.price, 10);
    const seatCode = `${row}${col}`;
    const cabinName = CABIN_NAMES[cabin];
    const priceText = price === 0 ? 'Included' : `+$${price}`;

    const banner = document.getElementById('confirmBanner');
    banner.classList.remove('empty');
    banner.classList.add('selected');
    document.getElementById('seatValue').textContent = seatCode;
    document.getElementById('seatDetail').innerHTML =
      `<strong>${cabinName}</strong> · ${priceText}` +
      `<div class="copy-hint">↓ Type "${seatCode}" into the chat input ↓</div>`;

    // postMessage bridge for Option 1 (NCC parent listener — undocumented)
    // Safe to leave in: if NCC doesn't listen, it's a no-op
    try {
      window.parent.postMessage({
        source: 'airline-seat-map',
        seat: seatCode,
        cabin: cabin,
        cabinName: cabinName,
        price: price,
        row: parseInt(row, 10),
        column: col
      }, '*');
    } catch (e) { /* ignore — iframe sandbox may block */ }
  }

  buildMap();
</script>

</body>
</html>
